<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Set to your Cloudflare Worker origin (no trailing slash) when using admin OAuth -->
    <meta name="dsa-admin-oauth-base" content="https://portfolio-admin-auth.akashsinghofficial15.workers.dev">
    <title>DSA Pattern Practice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css?v=3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body class="dsa-page">
    <div class="navbar">
        <div class="left"><a href="./index.html" class="dsa-app-title">DSA Pattern Practice</a></div>
        <div class="right">
            <a href="https://github.com/AkashSingh1505/dsa-pattern-practice" target="_blank" rel="noopener noreferrer">GitHub</a>
            <a id="nav-admin-entry" class="nav-admin-entry" href="#">Login</a>
            <button type="button" id="nav-admin-signout" class="nav-signout-btn" hidden>Sign out</button>
        </div>
    </div>

    <div class="content-box">
        <div class="section">
            <h3 class="section-title">DSA problem patterns</h3>
            <h4 class="section-description">Full map opens by default (all topics under DSA Patterns). Use One topic to focus on a single structure. The map flows left → right; scroll the shaded area when it’s wide.</h4>
        </div>

        <div id="dsa-hierarchy-root" class="dsa-graph-viewport" aria-label="DSA pattern graph"></div>
    </div>

    <div class="footer">
        <div class="footer-bottom">
            <div class="footer-copyright">
                <p>DSA Pattern Practice — pattern-led practice</p>
            </div>
            <div
                id="footer-visitors"
                class="footer-visitors"
                hidden
                aria-live="polite"
                role="status"
                aria-label="Site visits"
            >
                <span class="footer-visitors-pulse" aria-hidden="true"></span>
                <span class="footer-visitors-num" id="footer-visitors-num"></span>
                <span class="footer-visitors-label">visits</span>
            </div>
        </div>
    </div>

    <script src="./auth/dsa-admin-auth.js?v=3"></script>
    <script src="./auth/dsa-user-auth.js?v=1"></script>
    <script src="./cms-bootstrap.js?v=3"></script>
    <script src="./dsa-sketch-native.js?v=3"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-clike.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        if (typeof Prism !== "undefined" && Prism.plugins && Prism.plugins.autoloader) {
            Prism.plugins.autoloader.languages_path =
                "https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/";
        }
    </script>
    <script src="./script.js?v=3"></script>
</body>
</html>
