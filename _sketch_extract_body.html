<div class="app" id="app">
<header class="header">
  <div class="brand">
    <div class="logo dsa-sk-brand-mark" id="brandMark"><span id="brandMarkText">D</span></div>
    <div class="brand-text"><h1 id="brandTitle">DSA Patterns</h1><p id="brandSubtitle">Learn DSA as a Connected System</p></div>
  </div>
  <div class="header-actions">
    <label class="btn-flat" data-tip="Import image" style="cursor:pointer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <span>Import</span>
      <input type="file" id="imgInput" accept="image/*" hidden/>
    </label>
    <button class="btn-flat danger" id="clearBtn" data-tip="Clear canvas">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
    </button>
  </div>
</header>
<div class="toolbar">
  <div class="group" data-group="view" data-nocollapse>
    <button class="btn" id="fsBtn" data-tip="Fullscreen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8V5a2 2 0 0 1 2-2h3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M21 16v3a2 2 0 0 1-2 2h-3"/></svg></button>
    <button class="btn" id="ziBtn" data-tip="Zoom In"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button>
    <button class="btn" id="zoBtn" data-tip="Zoom Out"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button>
    <button class="btn" id="zrBtn" data-tip="Reset zoom"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg></button>
  </div>
  <div class="group" data-group="history" data-nocollapse>
    <button class="btn" id="undoBtn" data-tip="Undo (⌘Z)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-15-6.7L3 13"/></svg></button>
    <button class="btn" id="redoBtn" data-tip="Redo (⌘⇧Z)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 15-6.7L21 13"/></svg></button>
  </div>
  <div class="group" data-group="draw">
    <button class="btn active" data-tool="brush" data-tip="Brush"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg></button>
    <button class="btn" data-tool="pencil" data-tip="Pencil"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button>
    <button class="btn" data-tool="marker" data-tip="Highlighter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l-6 6v3h3l6-6"/><path d="M22 12l-4.6 4.6a2 2 0 0 1-2.8 0L9 11l5-5 8 6z"/></svg></button>
    <button class="btn" data-tool="eraser" data-tip="Eraser"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7l-4-4 11-11 8 8-7 7"/><line x1="14" y1="6" x2="20" y2="12"/></svg></button>
  </div>
  <div class="group" data-group="laser" data-nocollapse>
    <button class="btn" data-tool="laser" data-tip="Laser Pointer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="2.5" fill="currentColor"/>
        <path d="M12 4v2"/><path d="M12 18v2"/><path d="M4 12h2"/><path d="M18 12h2"/>
        <path d="M6.34 6.34l1.41 1.41"/><path d="M16.24 16.24l1.41 1.41"/>
        <path d="M6.34 17.66l1.41-1.41"/><path d="M16.24 7.76l1.41-1.41"/>
      </svg>
    </button>
  </div>
  <div class="group" data-group="shapes">
    <button class="btn" data-tool="line" data-tip="Line"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="20" x2="20" y2="4"/></svg></button>
    <button class="btn" data-tool="rect" data-tip="Rectangle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/></svg></button>
    <button class="btn" data-tool="circle" data-tip="Circle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg></button>
    <button class="btn" data-tool="arrow" data-tip="Arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="20" x2="20" y2="4"/><polyline points="10 4 20 4 20 14"/></svg></button>
  </div>
  <div class="group" data-group="insert">
    <button class="btn" data-tool="text" data-tip="Text"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg></button>
    <button class="btn" data-tool="grid" data-tip="Add Table"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg></button>
  </div>
  <div class="sg"><label>Size</label><input type="range" id="sizeR" min="1" max="80" value="6"/><span class="chip" id="sizeV">6</span></div>
  <div class="sg"><label>Opacity</label><input type="range" id="opR" min="10" max="100" value="100"/><span class="chip" id="opV">100</span></div>
  <div class="gridCtl" id="gridCtl">
    <div class="sg"><label>Rows</label><input type="number" id="gRows" min="1" max="50" value="6"/></div>
    <div class="sg"><label>Cols</label><input type="number" id="gCols" min="1" max="50" value="6"/></div>
  </div>
  <div class="colors" id="colors">
    <div class="swatch active" data-color="#1d1d1f" style="background:#1d1d1f"></div>
    <div class="swatch" data-color="#ffffff" style="background:#fff"></div>
    <div class="swatch" data-color="#ff3b30" style="background:#ff3b30"></div>
    <div class="swatch" data-color="#ff9500" style="background:#ff9500"></div>
    <div class="swatch" data-color="#ffcc00" style="background:#ffcc00"></div>
    <div class="swatch" data-color="#34c759" style="background:#34c759"></div>
    <div class="swatch" data-color="#007aff" style="background:#007aff"></div>
    <div class="swatch" data-color="#5856d6" style="background:#5856d6"></div>
    <div class="swatch" data-color="#af52de" style="background:#af52de"></div>
    <div class="swatch" data-color="#ff2d55" style="background:#ff2d55"></div>
    <label class="cpw" data-tip="Custom"><input type="color" id="cp" value="#000000"/></label>
  </div>
</div>
<div class="cw" id="cw">
  <div class="stage" id="stage">
    <canvas id="canvas"></canvas>
    <canvas id="overlay"></canvas>
    <textarea class="text-editor" id="textEditor" spellcheck="false"></textarea>
    <div class="grid-actions" id="gridActions">
      <button class="grid-btn done" id="gridDone"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Done</button>
      <button class="grid-btn cancel" id="gridRemove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Cancel</button>
    </div>
  </div>
  <div class="pen-badge" id="penBadge"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg><span>Pencil Connected</span></div>
  <div class="fz"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span id="zV">100%</span></div>
</div>
<div class="status">
  <div class="srow">
    <span>Tool · <span class="pill" id="sT">Brush</span></span>
    <span>Color · <span class="pill"><span class="sdot" id="sCD" style="background:#1d1d1f"></span><span id="sCT">#1d1d1f</span></span></span>
    <span>Size · <span class="pill" id="sS">6 px</span></span>
    <span id="pressureWrap" style="display:none">Pressure · <span class="pill" id="sPr">0.50</span></span>
  </div>
  <div class="srow"><span class="pill" id="sP">x: 0 · y: 0</span></div>
</div>
</div>
<div class="toast" id="toast"><span id="tT"></span></div>
